# DNB pipeline configuration
# ---------------------------------------------------------
# Phase-prediction scheduling:
#   detection_phase = pi (trough)    -- detect here
#   stim_phase = 0 (positive peak)   -- stimulate here
#
#   Lead time = half period (detection -> stim):
#     At 1 Hz:   500 ms
#     At 0.5 Hz: 1000 ms
#
#   Phase map:  0=peak  pi/2=falling  pi=trough  3pi/2=rising  2pi=peak

pipeline:
  sample_rate: 30000.0       # hardware rate (downsampler reduces to 500 Hz)
  n_channels: 1
  buffer_duration: 10.0
  chunk_duration: 0.5

# -- Source ------------------------------------------------
# type: file | nplay | cerebus | auto

source:
  type: nplay                # change to 'cerebus' at hospital
  # path: data/recording.npz
  # inst_addr: ""
  # client_addr: "0.0.0.0"

downsampler:
  enabled: true
  target_rate: 500.0

wavelet:
  freq_min: 0.5
  freq_max: 4.0
  n_freqs: 10
  n_cycles_base: 1.5         # keep low for real-time latency
                              # 1.5 cycles at 0.5 Hz ~ 1.9s kernel half-len
                              # (TWave uses ~1 cycle equivalent via truncation)

target_wave:
  id: slow_wave
  freq_range: [0.5, 4.0]
  detection_phase: pi         # pi = trough
  phase_tolerance: 0.05
  amp_min: 1000.0
  amp_max: 10000.0
  warmup_chunks: 10

amplitude_monitor:
  enabled: true
  id: ied_monitor
  freq_range: [80.0, 120.0]
  # threshold: 500.0          # uncomment for absolute mode
  adaptive_n_std: 3.0
  warmup_chunks: 20
  baseline_chunks: 100

trigger:
  activation_detector_id: slow_wave
  inhibition_detector_id: ied_monitor
  n_pulses: 1                # 0=detect-only, 1=single, n>1=n-pulse
  stim_phase: 0.0            # 0 = positive peak
  backoff_s: 5.0
  inhibition_cooldown_s: 1.0 # brief cooldown -- gate at moment of stim,
                              # not a multi-second block. Mirrors TWave's
                              # per-stim HF/LF ratio gate approach.

audio:
  wav_path: assets/pink_noise_short.wav
  volume: 1.0