# DNB Pipeline Configuration
# ===========================
# All detection parameters can be changed here.
# Run with: python run.py --config config.yaml

# --- Data source ---
source:
  type: nplay               # nplay | cerebus | file
  # path: "recording.npz"   # required for type: file
  # inst_addr: ""            # IP for cerebus
  # protocol: "NPLAY"        # protocol for nplay

# --- Pipeline ---
pipeline:
  sample_rate: 30000         # Hz (overridden by file source if applicable)
  n_channels: 83
  channel: 1                 # single channel to process (null = all)
  chunk_duration: 0.5        # seconds per processing chunk
  buffer_duration: 10.0      # ring buffer length in seconds

# --- Downsampler ---
# Decimates the signal for efficient low-frequency processing.
# Essential for real-time at 30kHz — reduces to 500Hz before wavelet.
downsampler:
  enabled: true
  target_rate: 500.0         # Hz

# --- Wavelet decomposition ---
wavelet:
  freq_min: 0.5              # lowest centre frequency (Hz)
  freq_max: 30.0             # highest centre frequency (Hz)
  n_freqs: 10                # number of log-spaced frequency bins
  n_cycles_base: 3.0         # wavelet cycles at freq_min
  # channels: [5]            # override channel selection (default: use pipeline.channel)

# --- Power estimator ---
power:
  enabled: true
  # bands:                   # custom frequency bands (default: standard neural bands)
  #   delta: [1.0, 4.0]
  #   theta: [4.0, 8.0]
  #   alpha: [8.0, 13.0]
  #   beta: [13.0, 30.0]

# --- Slow wave detector (TWave parameters) ---
slow_wave:
  target_phase: 0.0          # target phase in radians (0 = negative peak)
  phase_tolerance: 0.15      # half-width of phase acceptance window (rad)
  freq_range: [0.5, 2.0]     # slow oscillation band (Hz)
  hf_freq_range: [10.0, 40.0]  # high-frequency band for IED rejection
  amp_min: 50.0              # minimum SO amplitude (µV)
  amp_max: 10000.0           # maximum SO amplitude — artifact rejection (µV)
  hf_ratio_max: 0.5          # max HF/LF ratio — IED rejection
  backoff_s: 5.0             # min seconds between STIM1 events
  stim2_delay_s: 0.6         # delay after STIM1 before STIM2 window (s)
  stim2_window_s: 2.0        # STIM2 acceptance window duration (s)
  warmup_chunks: 10          # chunks to skip at start for baseline
  amp_smoothing: 5           # chunks to average amplitude over
  event_window_s: 1.0        # ±seconds of raw signal to capture around events
  # channels: [5]            # override channel selection

# --- Audio stimulation ---
audio:
  wav_path: "assets/pink_noise_short.wav"
  trigger_on: ["STIM1"]      # which event types trigger playback
  volume: 1.0                # 0.0 to 1.0

# --- Validation ---
# Used by the validation scripts, not the live pipeline.
validation:
  event_window_s: 1.0        # ±seconds of raw signal around each event
  ground_truth_path: null     # path to annotation CSV (timestamp, type, channel)
  time_tolerance_s: 0.05     # matching tolerance for ground truth comparison
  snr_levels: [1.0, 2.0, 3.0, 5.0, 10.0]  # SNR values for synthetic validation
