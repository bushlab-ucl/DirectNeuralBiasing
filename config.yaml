# DNB pipeline configuration
# ─────────────────────────────────────────────────────────
# This file drives both run.py and can be loaded in notebooks
# via dnb.config.build_pipeline().

pipeline:
  sample_rate: 30000.0       # hardware rate (downsampler reduces to 500 Hz)
  n_channels: 1
  buffer_duration: 10.0
  chunk_duration: 0.5

source:
  type: file                 # file | nplay | cerebus
  path: data/recording.npz

downsampler:
  enabled: true
  target_rate: 500.0

wavelet:
  freq_min: 0.5
  freq_max: 4.0
  n_freqs: 10
  n_cycles_base: 3.0

target_wave:
  id: slow_wave
  freq_range: [0.5, 4.0]
  target_phase: 0.0          # 0 = positive peak
  phase_tolerance: 0.05
  amp_min: 1000.0
  amp_max: 10000.0
  warmup_chunks: 10
  amp_smoothing: 5

amplitude_monitor:
  enabled: true
  id: ied_monitor
  freq_range: [80.0, 120.0]  # broadband IED power check
  # threshold: 500.0          # uncomment for absolute mode
  adaptive_n_std: 3.0         # adaptive: mean + 3σ
  warmup_chunks: 20
  baseline_chunks: 100

trigger:
  activation_detector_id: slow_wave
  inhibition_detector_id: ied_monitor
  n_pulses: 1                # 0=none, 1=single, n>1=n-pulse
  backoff_s: 5.0
  inhibition_cooldown_s: 5.0

# audio:
#   wav_path: assets/pink_noise_short.wav
#   trigger_on: [STIM]
#   volume: 1.0

validation:
  snr_levels: [1.0, 2.0, 3.0, 5.0, 10.0]